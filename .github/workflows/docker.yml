name: docker
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t bedrock-multimodal-rag:ci .
      - name: Show image size
        run: docker images bedrock-multimodal-rag:ci
      - name: Smoke test (modules import cleanly)
        run: docker run --rm bedrock-multimodal-rag:ci
